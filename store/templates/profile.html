

<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:0;
}

.profile-container{
    width:400px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.2);
    text-align:center;
}

.profile-icon{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#007bff;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    margin:auto;
    margin-bottom:20px;
}

h1{
    margin-bottom:20px;
}

.info-box{
    background:#f9f9f9;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    text-align:left;
}

.info-box strong{
    color:#007bff;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    text-decoration:none;
    background:green;
    color:white;
    border-radius:10px;
}

.btn:hover{
    background:darkgreen;
}

.back-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    text-decoration:none;
    background:#007bff;
    color:white;
    border-radius:10px;
}

.back-btn:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="profile-container">

<div class="profile-icon">

{{request.user.username|first|upper}}

</div>

<h1>My Profile</h1>

<div class="info-box">

<strong>Username:</strong>

{{request.user.username}}

</div>

<div class="info-box">

<strong>Phone:</strong>

{{profile.phone}}

</div>

<div class="info-box">

<strong>Address:</strong>

{{profile.address}}

</div>

<a href="{% url 'my_orders' %}" class="btn">

📦 My Orders

</a>

<br>

<a href="/" class="back-btn">

🏠 Home

</a>

</div>

</body>
</html>
