<!DOCTYPE html>
<html>

<head>
<title>{{product.name}}</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

}

.container{

background:white;
width:900px;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.2);

display:flex;
gap:30px;
align-items:center;

}

.image-box img{

width:350px;
height:350px;
object-fit:contain;

}

.details{

flex:1;

}

h1{

font-size:35px;
margin-bottom:20px;
color:#222;

}

h2{

color:green;
font-size:28px;
margin-bottom:20px;

}

p{

font-size:18px;
line-height:30px;
margin-bottom:25px;
color:#555;

}

.btn{

border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
color:white;
font-size:16px;
text-decoration:none;
margin-right:10px;

}

.back-btn{

background:#007bff;

}

.cart-btn{

background:#ff3b30;

}

.btn:hover{

opacity:.8;

}




@media(max-width:768px){

.container{

flex-direction:column;
width:90%;
text-align:center;

}

.image-box img{

width:250px;
height:250px;

}

h1{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="image-box">

<img src="{{product.image.url}}">

</div>


<div class="details">

<h1>
{{product.name}}
</h1>

<h2>
Price : ₹{{product.price}}
</h2>

<p>
{{product.description}}
</p>


<a href="/" class="btn back-btn">

⬅ Back

</a>


<a href="{% url 'add_to_cart' product.id %}" class="btn cart-btn">

🛒 Add To Cart

</a>

</div>

</div>

</body>
</html>
