<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1800&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

.container{

    width:420px;

    background:rgba(255,255,255,.96);

    padding:45px;

    border-radius:22px;

    text-align:center;

    box-shadow:0 25px 60px rgba(0,0,0,.35);

    backdrop-filter:blur(10px);

}

h1{

    color:#6B3E1F;

    margin-bottom:10px;

    font-size:34px;

}

.subtitle{

    color:#777;

    margin-bottom:28px;

    font-size:15px;

}

input{

    width:100%;

    padding:15px;

    margin:12px 0;

    border:1px solid #ddd;

    border-radius:12px;

    outline:none;

    font-size:16px;

    transition:.35s;

    background:#fafafa;

}

input:focus{

    border-color:#8B5E3C;

    background:white;

    box-shadow:0 0 12px rgba(139,94,60,.25);

}

button{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#8B5E3C,#6B3E1F);

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.35s;

}

button:hover{

    transform:translateY(-4px);

    box-shadow:0 15px 35px rgba(107,62,31,.35);

}

.error{

    color:#d62828;

    margin-bottom:12px;

    font-weight:600;

}

.login-link{

    margin-top:22px;

    color:#666;

    font-size:15px;

}

.login-link a{

    color:#8B5E3C;

    text-decoration:none;

    font-weight:700;

}

.login-link a:hover{

    color:#6B3E1F;

    text-decoration:underline;

}

@media(max-width:480px){

.container{

    width:92%;

    padding:35px 25px;

}

h1{

    font-size:28px;

}

}

</style>

</style>

</head>

<body>
    <p class="subtitle">Create your D Croft Wood Account</p>

<div class="container">

<h1>Create Account</h1>

{% if error %}
<p class="error">
{{ error }}
</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Signup
</button>

</form>

<div class="login-link">
Already have an account?
<a href="/login">Login</a>
</div>

</div>

</body>
</html>
