<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
background:#28a745;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:.8;
}

</style>

</head>

<body>

<div class="container">

<h1>Checkout</h1>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="name"
placeholder="Enter Name"
required>


<input
type="text"
name="phone"
placeholder="Mobile Number"
required>

<input
type="text"
name="address"
placeholder="Enter Address"
required>

<h3>Total: ₹{{total}}</h3>

<button type="submit">
Place Order
</button>

</form>

</div>

</body>
</html>
