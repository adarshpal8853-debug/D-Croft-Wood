<!DOCTYPE html>
<html>
<head>
<title>D Croft Wood | Cart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f7f5f2;
}


/* Header */

.header{

background:white;

padding:20px 50px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 2px 15px rgba(0,0,0,.1);

}

.logo a{

text-decoration:none;
font-size:30px;
font-weight:bold;

color:#6b4e35;

}

.nav-links a{

text-decoration:none;
margin-left:20px;

font-size:17px;
font-weight:500;

color:#444;

}

.nav-links a:hover{

color:#b9804f;

}


/* Heading */

.heading{

text-align:center;
padding:40px;

}

.heading h1{

font-size:45px;

color:#6b4e35;

}


/* Cart */

.cart-container{

display:flex;
flex-direction:column;

gap:25px;

padding:20px;

}

.cart-card{

width:85%;
margin:auto;

background:white;

padding:20px;

border-radius:20px;

display:flex;
align-items:center;

box-shadow:
0px 5px 15px rgba(0,0,0,.1);

transition:.4s;

}

.cart-card:hover{

transform:translateY(-5px);

}

.cart-card img{

width:150px;
height:150px;

object-fit:cover;

border-radius:15px;

margin-right:25px;

}

.details{

flex:1;

}

.details h2{

margin-bottom:10px;
color:#333;

}

.price{

font-size:20px;
font-weight:bold;

color:#b9804f;

margin-bottom:15px;

}


/* Buttons */

button{

padding:10px 15px;

border:none;

border-radius:30px;

cursor:pointer;

font-size:15px;

}

.qty-btn{

background:#b9804f;
color:white;

}

.qty-btn:hover{

background:#9f7046;

}

.remove-btn{

background:#ff4d4d;
color:white;

margin-top:10px;

}

.remove-btn:hover{

background:#cc0000;

}


/* Total */

.total-box{

width:85%;
margin:auto;
margin-top:30px;

background:white;

padding:30px;

border-radius:20px;

box-shadow:
0px 5px 15px rgba(0,0,0,.1);

text-align:right;

}

.total-box h2{

margin-bottom:20px;

color:#333;

}

.checkout-btn{

padding:15px 30px;

background:#28a745;

color:white;

border:none;

border-radius:30px;

font-size:16px;

}

.checkout-btn:hover{

background:#1f8a37;

}

.back{

display:block;

text-align:center;

margin:30px;

text-decoration:none;

font-size:18px;

color:#6b4e35;

font-weight:bold;

}


/* Responsive */

@media(max-width:768px){

.cart-card{

flex-direction:column;
text-align:center;

}

.cart-card img{

margin-right:0;
margin-bottom:20px;

}

.header{

flex-direction:column;
gap:15px;

}

}

</style>

</head>

<body>


<header class="header">

<div class="logo">

<a href="/">
D Croft Wood
</a>

</div>

<div class="nav-links">

<a href="{% url 'home' %}">
🏠 Home
</a>

<a href="{% url 'shop' %}">
🛍 Shop
</a>

<a href="{% url 'wishlist' %}">
❤️ Wishlist
</a>

</div>

</header>



<div class="heading">

<h1>
🛒 My Cart
</h1>

</div>


<div class="cart-container">

{% for item in items %}

<div class="cart-card">

<img src="{{ item.product.image.url }}">


<div class="details">

<h2>

{{ item.product.name }}

</h2>

<p class="price">

Price: ₹{{ item.product.price }}

</p>

<p>

<a href="{% url 'decrease' item.id %}">

<button class="qty-btn">

-

</button>

</a>

<strong>

{{ item.quantity }}

</strong>

<a href="{% url 'increase' item.id %}">

<button class="qty-btn">

+

</button>

</a>

</p>


<a href="{% url 'remove_from_cart' item.id %}">

<button class="remove-btn">

Remove

</button>

</a>

</div>

</div>

{% endfor %}

</div>


<div class="total-box">

<h2>

Grand Total: ₹{{ total }}

</h2>


<a href="{% url 'checkout' %}">

<button class="checkout-btn">

Proceed To Checkout

</button>

</a>

</div>


<a class="back" href="/">

⬅ Continue Shopping

</a>

</body>
</html>
