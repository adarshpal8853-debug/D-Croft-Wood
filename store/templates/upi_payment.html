{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>UPI Payment</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{

width:420px;
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);

}

img{

width:280px;
border-radius:10px;

}


color:#6a1b9a;

}

button{

width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;

}

button:hover{

background:#15803d;

}

</style>

</head>

<body>

<div class="box">

<h1>D Croft Wood</h1>

<h3>Scan & Pay</h3>

<img src="{% static 'images/qr.png' %}">

<h3>
UPI ID :
9555790489@ibl
</h3>

<h2>
₹ {{ request.session.total }}
</h2>

<form method="POST">

{% csrf_token %}

<button>

I Have Paid

</button>

</form>

</div>

</body>

</html>
