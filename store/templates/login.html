<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1800&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

.container{

    width:420px;

    background:rgba(255,255,255,.96);

    padding:45px 40px;

    border-radius:22px;

    box-shadow:
    0 25px 60px rgba(0,0,0,.35);

    backdrop-filter:blur(8px);

    animation:fadeUp .8s ease;

}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

h1{

    text-align:center;

    color:#6B3E1F;

    font-size:34px;

    margin-bottom:10px;

    font-weight:700;

}

.subtitle{

    text-align:center;

    color:#777;

    margin-bottom:30px;

    font-size:15px;

}

.input-group{

    margin-bottom:18px;

}

input{

    width:100%;

    padding:15px 18px;

    border:1px solid #ddd;

    border-radius:12px;

    font-size:16px;

    outline:none;

    transition:.35s;

    background:#fafafa;

}

input:focus{

    border-color:#8B5E3C;

    background:white;

    box-shadow:0 0 12px rgba(139,94,60,.25);

}

button{

    width:100%;

    padding:15px;

    margin-top:12px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#8B5E3C,#6B3E1F);

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.35s;

}

button:hover{

    transform:translateY(-4px);

    box-shadow:0 15px 35px rgba(107,62,31,.35);

}

button:active{

    transform:scale(.98);

}

.signup-link{

    margin-top:25px;

    text-align:center;

    color:#666;

    font-size:15px;

}

.signup-link a{

    color:#8B5E3C;

    text-decoration:none;

    font-weight:700;

    transition:.3s;

}

.signup-link a:hover{

    color:#6B3E1F;

    text-decoration:underline;

}

@media(max-width:500px){

.container{

    width:92%;

    padding:35px 25px;

}

h1{

    font-size:28px;

}

}



</style>

</head>

<body>

<div class="container">

<h1>Login</h1>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="signup-link">
Don't have an account?
<a href="/signup">Signup</a>
</div>

</div>

</body>
</html>
