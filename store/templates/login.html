<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);

}

.container{

background:white;
padding:40px;
width:380px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;

}

h1{

margin-bottom:25px;
color:#1e3c72;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
outline:none;
font-size:16px;
transition:0.3s;

}

input:focus{

border-color:#2a5298;
box-shadow:0 0 8px rgba(42,82,152,0.5);

}

button{

width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2a5298;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#1e3c72;
transform:scale(1.03);

}

.signup-link{

margin-top:20px;
font-size:14px;

}

.signup-link a{

text-decoration:none;
color:#2a5298;
font-weight:bold;

}

.signup-link a:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<div class="container">

<h1>Login</h1>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="signup-link">
Don't have an account?
<a href="/signup">Signup</a>
</div>

</div>

</body>
</html>
