<!DOCTYPE html>
<html>

<head>

<title>D Croft Wood Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f7f5f2;
}




.header{

background:white ;

padding:20px 50px;

display:flex;
justify-content:space-between;
align-items:center;

flex-wrap:wrap;

box-shadow:0 2px 15px rgba(0,0,0,.1);

}

.logo a{

text-decoration:none;

font-size:30px;
font-weight:bold;

color:#6b4e35;
 


}

.search-box form{


display:flex;
justify-content:flex-end;
width:70%;

}

.search-box input{

width:400px;

padding:12px;

border:none;
outline:none;

background:#f1f1f1;

border-radius:30px 0px 0px 30px;

}

.search-box button{

padding:12px 18px;

border:none;

background:#b9804f;

color:white;

cursor:pointer;

border-radius:0px 30px 30px 0px;
 
text-align:center;

}

.nav-links a{

text-decoration:none;

margin-right:30px;
margin-left:20px;

font-size:17px;

color:#444;

font-weight:500;

}

.nav-links a:hover{

color:#b9804f;

}



.hero{

padding:60px;

text-align:center;

background:#1f1a17;

color:white;

}

.hero h1{

font-size:45px;
margin-bottom:15px;

}

.hero p{

font-size:20px;

}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:50px;
}

.cart-link{
    position:relative;
    text-decoration:none;
}

.cart-count{
    position:absolute;
    top:-8px;
    right:-12px;

    width:20px;
    height:20px;

    background:red;
    color:white;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:12px;
    font-weight:bold;
}

.card{
    position:relative;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:18px;
    text-align:center;
}

.card h3{
    font-size:26px;
    margin:10px 0;
}

.price{
    color:#16a34a;
    font-size:32px;
    font-weight:bold;
    margin:10px 0;
}

.desc{
    color:#666;
    line-height:26px;
    margin-bottom:20px;
}

/* ---------- Buttons ---------- */

.btn-group{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.btn{
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    color:#fff;
    font-size:15px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    opacity:.9;
}

.detail-btn{
    background:#444;
}

.cart-btn{
    background:#b9804f;
}

.buy-btn{
    background:#16a34a;
}

/* ---------- Wishlist ---------- */

.wishlist-icon{
    position:absolute;
    top:15px;
    right:15px;
    width:45px;
    height:45px;
    border-radius:50%;
    background:#fff;
    color:#ff3366;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    text-decoration:none;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.3s;
}

.wishlist-icon:hover{
    background:#ff3366;
    color:white;
}



@media(max-width:768px){

    .container{
        padding:20px;
        gap:20px;
    }

    .btn-group{
        grid-template-columns:1fr;
    }

    .card h3{
        font-size:22px;
    }

    .price{
        font-size:28px;
    }

    .search-box input{
        width:220px;
    }
}
</style>

</head>

<body>

<header class="header">

<div class="logo">

<a href="{% url 'home' %}">

D Croft Wood

</a>

</div>




<div class="nav-links">

<a href="{% url 'home' %}">
🏠 Home
</a>

<a href="{% url 'shop' %}">
🛍 Shop
</a>

<a href="{% url 'cart' %}" class="cart-link">
    🛒 Cart

    <span class="cart-count" id="cart-count">
        {{ cart_count }}
    </span>
</a>
<a href="{% url 'my_orders' %}">
📦 Orders
</a>


<a href="{% url 'wishlist' %}">
❤️ Wishlist
</a>

</div><br>




</header>


<div class="hero">
 <div class="search-box">

<form method="GET">

<input
type="text"
placeholder="Search Furniture..."
name="q">

<button>

🔍

</button>

</form>

</div>
<br>
<h1>

Premium Furniture Collection

</h1>

<p>

Explore our luxury furniture collection

</p>

</div>



<div class="container">

{% for product in products %}

<div class="card">

    <a href="{% url 'add_to_wishlist' product.id %}" class="wishlist-icon">
        ❤️
    </a>

    <img src="{{ product.image.url }}" alt="{{ product.name }}">

    <div class="card-content">

        <h3>{{ product.name }}</h3>

        <p class="price">
            ₹{{ product.price }}
        </p>

        <p class="desc">
            {{ product.description|truncatewords:10 }}
        </p>

        <div class="btn-group">

            <a href="{% url 'product_detail' product.id %}" class="btn detail-btn">
                View
            </a>

           <a href="#" class="btn cart-btn add-cart" data-id="{{ product.id }}">
            Cart
        </a>

            <a href="{% url 'buy_now' product.id %}" class="btn buy-btn">
                Buy
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>
<script>
    console.log("JavaScript Loaded");

document.querySelectorAll(".add-cart").forEach(button => {

    button.addEventListener("click", function(e){

        e.preventDefault();

        let productId = this.dataset.id;

        fetch("/add-to-cart/" + productId + "/")
        .then(response => response.json())
        .then(data => {

            if(data.success){

                document.getElementById("cart-count").innerHTML = data.cart_count;

            }

        });

    });

});

</script>
