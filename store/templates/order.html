<!DOCTYPE html>
<html>
<head>

<title>Place Order | D Croft Wood</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:#fff;
padding:20px 60px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.logo{
font-size:34px;
font-weight:bold;
color:#6B4423;
}

.container{

width:90%;
max-width:1200px;

margin:40px auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:40px;

}

.product-card{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

text-align:center;

}

.product-card img{

width:100%;
height:350px;

object-fit:contain;

border-radius:15px;

background:#fafafa;

}

.product-card h2{

margin:20px 0 10px;

font-size:30px;

color:#333;

}

.price{

font-size:32px;

font-weight:bold;

color:#27ae60;

margin-bottom:20px;

}

.product-card p{

font-size:17px;

line-height:30px;

color:#666;

}

.form-card{

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.form-card h2{

margin-bottom:25px;

color:#6B4423;

}

input,textarea{

width:100%;

padding:15px;

margin-bottom:18px;

border:1px solid #ddd;

border-radius:10px;

font-size:16px;

outline:none;

}

input:focus,
textarea:focus{

border-color:#B9804F;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:50px;

background:linear-gradient(135deg,#B9804F,#8B5E3C);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 15px 30px rgba(0,0,0,.2);

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">

D Croft Wood

</div>

</div>

<div class="container">

<div class="product-card">

<img src="{{ product.image.url }}">

<h2>{{ product.name }}</h2>

<div class="price">

₹{{ product.price }}

</div>

<p>

{{ product.description }}

</p>

</div>

<div class="form-card">

<h2>Shipping Details</h2>

<form method="POST" action="{% url 'payment' %}">

{% csrf_token %}

<input
type="hidden"
name="product"
value="{{ product.name }}">

<input
type="hidden"
name="price"
value="{{ product.price }}">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="text"
name="phone"
placeholder="Phone Number"
required>

<textarea
name="address"
rows="5"
placeholder="Delivery Address"
required></textarea>

<input
type="number"
name="quantity"
value="1"
min="1">

<button type="submit">

Proceed To Payment →

</button>

</form>

</div>

</div>

</body>
</html>
