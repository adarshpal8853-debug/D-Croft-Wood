<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:white;
width:250px;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

img{
width:100%;
height:200px;
object-fit:contain;
}

</style>

</head>

<body>

<h1>❤️ My Wishlist</h1>

<div class="container">

{% for item in items %}

<div class="card">

<img src="{{ item.product.image.url }}">

<h3>
{{ item.product.name }}
</h3>

<p>
₹{{ item.product.price }}
</p>

</div>

{% empty %}

<h2>No Wishlist Items</h2>

{% endfor %}

</div>
 <a href="/">click for back</a>
</body>
</html>
